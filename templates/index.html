<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>is this cat orange??</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">cat fur detector</p>
        <h1>is this cat orange??</h1>

        {% if error %}
          <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('analyze_page') }}" method="post" enctype="multipart/form-data" class="upload-form">
          <label for="image">Upload a cat image</label>
          <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/webp" required>
          <button type="submit">Analyze cat</button>
        </form>
      </section>
    </main>
  </body>
</html>
